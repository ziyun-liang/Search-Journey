<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Search Journey Prototype</title>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     TPL Design Tokens (fonts, colors, spacing, typography)
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<link rel="stylesheet" href="tokens.css" />

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Base Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #f5f5f5;
  font-family: var(--font-franklin);
  color: var(--ink);
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: row;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Sidebar Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#sidebar {
  width: 240px;
  min-width: 240px;
  height: 100vh;
  background: var(--card-bg);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  padding: 28px 20px 20px;
  overflow-y: auto;
}

.sidebar-title {
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 18px;
  color: var(--ink);
  margin-bottom: 2px;
}

.sidebar-subtitle {
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 24px;
}

#sidebar-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px 12px;
  border-radius: 8px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 13px;
  color: var(--ink);
  transition: background 0.12s;
}

.sidebar-item:hover {
  background: #f5f5f5;
}

.sidebar-item.active {
  background: #f0f0f0;
  font-weight: 600;
}

.sidebar-item .status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sidebar-item .status-dot.ready { background: #2a9d6e; }
.sidebar-item .status-dot.empty { background: #e6a117; }

.sidebar-section {
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 16px 12px 6px;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Main Area + Toggle Bar
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 0;
}

#toggle-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 20px 0 0;
  flex-shrink: 0;
}

.toggle-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #999;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn:hover { background: rgba(0,0,0,0.06); color: #666; }
.toggle-btn.active { background: rgba(0,0,0,0.08); color: var(--ink); }
.toggle-btn svg {
  width: 20px; height: 20px;
  stroke: currentColor; fill: none;
  stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Device Frames
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#frame-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  min-height: 0;
  padding: 16px 24px 24px;
}

#device-wrapper {
  transform-origin: top center;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

#device-frame {
  background: var(--card-bg);
  position: relative;
  overflow: hidden;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              border-radius 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #device-frame {
  border-radius: 44px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
}
.mode-desktop #device-frame {
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.phone-chrome { transition: opacity 0.3s ease; }
.mode-desktop .phone-chrome { opacity: 0; pointer-events: none; }

.phone-status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  background: var(--card-bg);
  font: 600 15px/1 -apple-system, 'SF Pro Text', sans-serif;
  color: #000;
  transition: background 0.3s, color 0.3s, opacity 0.3s;
}
.phone-status-bar .status-icons { display: flex; align-items: center; gap: 5px; }
.phone-status-bar .status-icons svg { width: 18px; height: 12px; }

.phone-home-indicator {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  pointer-events: none;
  z-index: 40;
  background: transparent;
}
.phone-home-indicator::after {
  content: '';
  width: 134px; height: 5px;
  background: #333;
  border-radius: 3px;
  margin-bottom: 8px;
}

#content-scroll {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: padding 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #content-scroll { padding: 54px 0 34px; }
.mode-desktop #content-scroll { padding: 48px 48px; }

/* When bottom nav is present */
.has-bottom-nav .mode-mobile #content-scroll,
#prototype-content.has-bottom-nav ~ .phone-home-indicator { }
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Shared Prototype Content Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#prototype-content {
  font-family: var(--font-franklin);
  color: var(--ink);
}

/* ── NYT Nav bar ── */
.nyt-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid #e2e2e2;
}
.nyt-nav button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
}
.nyt-logo-img {
  display: block;
  height: 27px;
  width: auto;
}

/* ── Placeholder for empty entry points ── */
.entry-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  text-align: center;
  gap: 12px;
  min-height: 400px;
}
.entry-placeholder .ep-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 8px;
}
.entry-placeholder .ep-icon svg {
  width: 24px;
  height: 24px;
}
.entry-placeholder h2 {
  font: var(--tpl-type-headline-24);
  color: var(--tpl-content-primary);
}
.entry-placeholder p {
  font: var(--tpl-type-body-16);
  color: var(--tpl-content-secondary);
  max-width: 280px;
}
.entry-placeholder .ep-tag {
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 12px;
  margin-top: 4px;
}
.ep-tag.ready { background: #e8f5e9; color: #2a9d6e; }
.ep-tag.todo { background: #fff3e0; color: #e6a117; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 82px;
  border-top: 0.5px solid var(--stroke-tertiary);
  background: rgba(255,255,255,0.98);
  display: flex;
  align-items: flex-start;
  padding-top: 4px;
  z-index: 35;
  transition: opacity 0.3s;
}
.mode-desktop .bottom-nav { opacity: 0; pointer-events: none; }

.tab-item {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--content-secondary-dim);
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 11px;
  line-height: normal;
  letter-spacing: 0.3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 52px;
  cursor: pointer;
}
.tab-icon { width: 24px; height: 24px; display: block; }
.tab-item.active { color: var(--content-primary); }

/* ── Home Tab specific ── */
.topbar {
  position: absolute;
  top: 54px; left: 0; right: 0;
  height: 45px;
  border-bottom: 1px solid #f2f2f2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: #fff;
  z-index: 9;
}
.mode-desktop .topbar { opacity: 0; pointer-events: none; }

.icon-btn {
  border: none;
  background: transparent;
  width: 24px; height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--content-primary);
  cursor: pointer;
  padding: 0;
}

.logo { width: 182px; height: auto; display: block; }

.ribbon {
  position: absolute;
  top: 99px; left: 0; right: 0;
  height: 49px;
  border-bottom: 1px solid #f2f2f2;
  background: #fff;
  white-space: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 8;
}
.ribbon::-webkit-scrollbar { display: none; }
.mode-desktop .ribbon { opacity: 0; pointer-events: none; }

.ribbon-track {
  display: inline-flex;
  align-items: center;
  height: 100%;
}
.ribbon-item {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 0 10px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 16px;
  color: var(--content-secondary-dim);
  text-decoration: none;
  white-space: nowrap;
}
.ribbon-item.selected {
  font-weight: 600;
  color: var(--content-primary);
  border-bottom: 4px solid var(--content-primary);
  padding-top: 2px;
}

/* ── Story list (Home tab) ── */
.story-list { padding: 12px 0 32px; }
.story-item { padding: 0 20px; }
.story-rule { height: 1px; background: var(--stroke-tertiary); }
.story-body { padding: 12px 0 24px; }
.story-content { display: flex; flex-direction: column; gap: 8px; }
.story-content-media { display: flex; flex-direction: column; gap: 16px; }
.story-row { display: flex; gap: 16px; align-items: flex-start; }
.story-row .story-content { flex: 1; min-width: 0; }

.headline-lead { margin: 0; font-family: var(--font-cheltenham); font-weight: 700; font-size: 28px; line-height: 1.15; color: var(--content-primary); }
.headline-large { margin: 0; font-family: var(--font-cheltenham); font-weight: 700; font-size: 26px; line-height: 1.15; color: var(--content-primary); }
.headline-standard { margin: 0; font-family: var(--font-cheltenham); font-weight: 700; font-size: 20px; line-height: 1.15; letter-spacing: 0.2px; color: var(--content-primary); }
.summary { margin: 0; font-family: var(--font-imperial); font-weight: 400; font-size: 16px; line-height: 1.39; color: var(--content-secondary); }
.meta { margin: 0; font-family: var(--font-franklin); font-weight: 500; font-size: 11px; line-height: 1.25; letter-spacing: 1.1px; text-transform: uppercase; color: var(--content-secondary); }
.top-label { margin: 0; font-family: var(--font-franklin); font-weight: 600; font-size: 11px; line-height: 1.25; letter-spacing: 1.1px; text-transform: uppercase; color: var(--content-primary); }
.top-label .label-secondary { color: var(--content-secondary-dim); }

.story-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
.thumb { width: 95px; height: 95px; object-fit: cover; flex-shrink: 0; }

/* ── Article styles ── */
.article-wrap { padding: 20px 20px 40px; display: flex; flex-direction: column; gap: 20px; }
.article-headline { font-family: var(--font-cheltenham); font-weight: 700; font-size: 36px; line-height: 40px; color: #121212; }
.article-dek { font-family: var(--font-cheltenham); font-weight: 400; font-size: 21px; line-height: 27px; color: #121212; }
.article-body { font-family: var(--font-imperial); font-weight: 400; font-size: 18px; line-height: 25px; color: #333; }
.article-body p { margin-bottom: 12.5px; }
.article-divider { border: none; border-top: 1px solid #e2e2e2; margin: 0; }
.byline-text { font-family: var(--font-franklin); font-weight: 500; font-size: 12px; line-height: 1.3; color: #121212; }
.byline-name { font-weight: 700; }
.article-date { font-family: var(--font-franklin); font-weight: 500; font-size: 12px; line-height: 1.3; color: #121212; }

/* ── You Tab styles ── */
.you-header { padding: 7px 20px 16px; position: relative; }
.you-title { margin: 0; font-family: var(--font-cheltenham); font-weight: 500; font-size: 28px; line-height: 1.15; color: var(--content-primary); }
.you-subtitle { margin: 0; font-family: var(--font-cheltenham); font-weight: 400; font-size: 28px; line-height: 1.15; color: var(--content-secondary-dim); }
.you-modules { padding: 0 20px; display: flex; flex-direction: column; gap: 42px; }
.module-title { margin: 0; font-family: var(--font-franklin); font-weight: 700; font-size: 18px; line-height: 1.3; color: var(--content-primary); }
.module-subtitle { margin: 0; font-family: var(--font-franklin); font-weight: 500; font-size: 14px; line-height: 1.3; color: var(--content-secondary); }
.story-title { margin: 0; font-family: var(--font-cheltenham); font-weight: 500; font-size: 18px; line-height: 1.2; letter-spacing: 0.18px; color: var(--content-primary); }
.story-meta { margin: 0; font-family: var(--font-franklin); font-weight: 500; font-size: 11px; line-height: 1.25; letter-spacing: 1.1px; text-transform: uppercase; color: var(--content-secondary-dim); }
.story-text { width: 244px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
.story-thumb { width: 95px; height: 95px; object-fit: cover; flex-shrink: 0; }
.module-items { display: flex; flex-direction: column; gap: 12px; }
.module-header { display: flex; flex-direction: column; gap: 12px; }
.see-all { display: inline-block; font-family: var(--font-franklin); font-weight: 600; font-size: 14px; color: var(--content-primary); text-decoration: underline; opacity: 0.8; cursor: pointer; background: none; border: none; padding: 12px 0; }
.caret-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }
.caret-icon svg { width: 7px; height: 12px; fill: none; stroke: var(--content-primary); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.module-title-row { display: flex; align-items: center; gap: 3px; }

/* ── Search Overlay ── */
.search-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #fff;
  z-index: 50;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.search-overlay.visible {
  transform: translateY(0);
}

.search-overlay-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 58px 16px 12px;
  border-bottom: 1px solid #f2f2f2;
  flex-shrink: 0;
}

.search-back-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
}
.search-back-btn svg {
  width: 20px;
  height: 20px;
}

.search-input-wrap {
  flex: 1;
  position: relative;
}

.search-input {
  width: 100%;
  height: 40px;
  border: 1px solid #e2e2e2;
  border-radius: 20px;
  padding: 0 16px;
  font-family: var(--font-franklin);
  font-size: 15px;
  font-weight: 500;
  color: var(--content-primary);
  background: #f8f8f8;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.search-input:focus {
  border-color: #121212;
  background: #fff;
}
.search-input::placeholder {
  color: #999;
  font-weight: 400;
}

.search-overlay-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 34px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.search-section-label {
  font-family: var(--font-franklin);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--content-primary);
  margin-bottom: 12px;
}

.try-asking-chips {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.try-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: #f8f8f8;
  border: 1px solid #f0f0f0;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.12s;
  font-family: var(--font-franklin);
  font-size: 14px;
  font-weight: 500;
  color: var(--content-primary);
  line-height: 1.4;
  text-align: left;
}
.try-chip:hover {
  background: #f0f0f0;
}
.try-chip .chip-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  opacity: 0.5;
}

.recent-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.recent-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid #f5f5f5;
  cursor: pointer;
  font-family: var(--font-franklin);
  font-size: 14px;
  font-weight: 500;
  color: var(--content-primary);
  transition: color 0.12s;
}
.recent-item:hover {
  color: #666;
}
.recent-item svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: #bbb;
}

.trending-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.trending-pill {
  padding: 8px 14px;
  background: #f5f5f5;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-franklin);
  font-size: 13px;
  font-weight: 500;
  color: var(--content-primary);
  transition: background 0.12s;
}
.trending-pill:hover {
  background: #e8e8e8;
}

/* ── Floating Action Button (search, light style) ── */
.search-fab {
  position: absolute;
  bottom: 48px;
  right: 20px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #fff;
  border: 1px solid #e2e2e2;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  z-index: 30;
  transition: transform 0.2s, box-shadow 0.2s, background 0.15s;
}
.search-fab:hover {
  transform: scale(1.06);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  background: #f8f8f8;
}
.search-fab:active {
  transform: scale(0.95);
}
.search-fab svg {
  width: 20px;
  height: 20px;
}

/* ── Two-prompt popup (fork from FAB) ── */
.fab-menu {
  position: absolute;
  bottom: 104px;
  right: 20px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.14);
  border: 1px solid #eee;
  z-index: 31;
  overflow: hidden;
  opacity: 0;
  transform: translateY(8px) scale(0.95);
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  width: 220px;
}
.fab-menu.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.fab-menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 14px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: var(--font-franklin);
  font-size: 14px;
  font-weight: 500;
  color: var(--content-primary);
  text-align: left;
  transition: background 0.1s;
}
.fab-menu-item:hover {
  background: #f5f5f5;
}
.fab-menu-item + .fab-menu-item {
  border-top: 1px solid #f2f2f2;
}
.fab-menu-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: #666;
}

/* ── Ask sheet (article contextual, half-height) ── */
.ask-sheet-scrim {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 49;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.ask-sheet-scrim.visible {
  opacity: 1;
  pointer-events: auto;
}

.ask-sheet {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 50%;
  background: #fff;
  border-radius: 16px 16px 0 0;
  z-index: 50;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.ask-sheet.visible {
  transform: translateY(0);
}

.ask-sheet-handle {
  width: 36px;
  height: 4px;
  background: #d4d4d4;
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}

.chat-overlay-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px 12px;
  border-bottom: 1px solid #f2f2f2;
  flex-shrink: 0;
}

.chat-overlay-title {
  font-family: var(--font-franklin);
  font-weight: 700;
  font-size: 16px;
  color: var(--content-primary);
  flex: 1;
}

.chat-overlay-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 34px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.chat-context-card {
  padding: 14px;
  background: #f8f8f8;
  border-radius: 12px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.chat-context-card .ctx-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: #e3f2fd;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.chat-context-card .ctx-icon svg {
  width: 16px;
  height: 16px;
}
.chat-context-card .ctx-text {
  font-family: var(--font-franklin);
  font-size: 13px;
  color: #666;
  line-height: 1.5;
}
.chat-context-card .ctx-text strong {
  color: var(--content-primary);
}

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid #f2f2f2;
  flex-shrink: 0;
}
.chat-input {
  width: 100%;
  height: 40px;
  border: 1px solid #e2e2e2;
  border-radius: 20px;
  padding: 0 16px;
  font-family: var(--font-franklin);
  font-size: 15px;
  font-weight: 500;
  color: var(--content-primary);
  background: #f8f8f8;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.chat-input:focus {
  border-color: #121212;
  background: #fff;
}
.chat-input::placeholder {
  color: #999;
  font-weight: 400;
}

/* ── Article bottom bar (persistent utility bar) ── */
.article-bar {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 50px;
  background: #fff;
  border-top: 1px solid #e2e2e2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 35;
}
.article-bar-left,
.article-bar-right {
  display: flex;
  align-items: center;
  gap: 4px;
}
.article-bar-btn {
  width: 40px;
  height: 40px;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: background 0.12s;
  padding: 0;
}
.article-bar-btn:hover {
  background: #f5f5f5;
}
.article-bar-btn svg {
  width: 20px;
  height: 20px;
}

/* ── Contextual search strip ── */
.ctx-strip {
  position: absolute;
  left: 12px; right: 12px;
  bottom: 54px;
  height: 37px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  cursor: pointer;
  z-index: 34;
  transition: background 0.12s;
}
.ctx-strip:hover {
  background: rgba(255,255,255,0.7);
}
.ctx-strip svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: #666;
}
.ctx-strip-text {
  font-family: var(--font-franklin);
  font-size: 13px;
  font-weight: 500;
  color: #666;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ctx-strip-text strong {
  color: var(--content-primary);
}
.ctx-strip-caret {
  font-size: 14px;
  color: #bbb;
  flex-shrink: 0;
}

/* ── Selection-active strip state ── */
@keyframes strip-pulse {
  0% { background: rgba(74,127,212,0.15); }
  100% { background: rgba(255,255,255,0.55); }
}
.ctx-strip.selection-active {
  animation: strip-pulse 0.6s ease-out;
}
.ctx-strip.selection-active svg {
  color: #4a7fd4;
}
.ctx-strip.selection-active .ctx-strip-text {
  color: #4a7fd4;
}
.ctx-strip.selection-active .ctx-strip-text strong {
  color: #4a7fd4;
}

/* ── Dark mode contextual strip (for Watch) ── */
.ctx-strip.dark {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.12);
  left: 16px; right: 60px;
  bottom: 98px;
}
.ctx-strip.dark:hover {
  background: rgba(0,0,0,0.65);
}
.ctx-strip.dark svg {
  color: rgba(255,255,255,0.6);
}
.ctx-strip.dark .ctx-strip-text {
  color: rgba(255,255,255,0.6);
}
.ctx-strip.dark .ctx-strip-text strong {
  color: #f8f8f8;
}
.ctx-strip.dark .ctx-strip-caret {
  color: rgba(255,255,255,0.4);
}

/* ── Dark strip pulse (timeline-aware update) ── */
@keyframes dark-strip-pulse {
  0% { background: rgba(74,127,212,0.25); }
  100% { background: rgba(0,0,0,0.5); }
}
.ctx-strip.dark.strip-updated {
  animation: dark-strip-pulse 0.8s ease-out;
}
.ctx-strip.dark.strip-updated svg {
  color: #6b9be8;
  transition: color 0.8s ease-out;
}
.ctx-strip.dark.strip-updated .ctx-strip-text {
  color: #6b9be8;
  transition: color 0.8s ease-out;
}
.ctx-strip.dark.strip-updated .ctx-strip-text strong {
  color: #6b9be8;
}

/* ── Dark mode bottom nav (for Watch) ── */
.bottom-nav.dark {
  background: rgba(18,18,18,1);
  border-top-color: #424242;
}
.bottom-nav.dark .tab-item {
  color: #8b8b8b;
}
.bottom-nav.dark .tab-item.active {
  color: #f8f8f8;
}
.bottom-nav.dark .tab-item .tab-icon {
  filter: none;
}
.bottom-nav.dark .tab-item:not(.active) .tab-icon {
  opacity: 0.5;
}
.bottom-nav.dark .tab-item.active .tab-icon {
  filter: brightness(0) invert(1);
  opacity: 1;
}

/* ── Dark mode ask sheet ── */
.ask-sheet.dark {
  background: #1a1a1a;
  border-radius: 16px 16px 0 0;
}
.ask-sheet.dark .ask-sheet-handle {
  background: #555;
}
.ask-sheet.dark .chat-overlay-header {
  border-bottom-color: #333;
}
.ask-sheet.dark .chat-overlay-title {
  color: #f8f8f8;
}
.ask-sheet.dark .chat-context-card {
  background: #2a2a2a;
}
.ask-sheet.dark .ctx-text {
  color: #aaa;
}
.ask-sheet.dark .ctx-text strong {
  color: #f8f8f8;
}
.ask-sheet.dark .try-chip {
  background: #2a2a2a;
  border-color: #333;
  color: #f8f8f8;
}
.ask-sheet.dark .try-chip:hover {
  background: #333;
}
.ask-sheet.dark .chat-input-area {
  border-top-color: #333;
}
.ask-sheet.dark .chat-input {
  background: #2a2a2a;
  border-color: #444;
  color: #f8f8f8;
}
.ask-sheet.dark .chat-input:focus {
  border-color: #888;
  background: #1a1a1a;
}
.ask-sheet.dark .chat-input::placeholder {
  color: #777;
}

/* ── Watch tab: full-screen video ── */
.watch-video {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 82px;
  background: #000;
  overflow: hidden;
}
.watch-video-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.watch-gradient {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 180px;
  background: linear-gradient(to top, rgba(0,0,0,0.81), rgba(0,0,0,0));
  pointer-events: none;
}
.watch-headline {
  position: absolute;
  left: 16px; right: 60px;
  bottom: 68px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 14px;
  line-height: 1.3;
  color: #f8f8f8;
  text-shadow: 0 0 1px rgba(0,0,0,0.79), 0 0 2px rgba(0,0,0,0.79);
}
.watch-controls {
  position: absolute;
  right: 16px;
  bottom: 48px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.watch-ctrl-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(18,18,18,0.6);
  border: 1px solid #424242;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.watch-ctrl-btn svg {
  width: 16px;
  height: 16px;
}
.watch-scrubber {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 4px;
  background: rgba(248,248,248,0.32);
}
.watch-scrubber-progress {
  height: 100%;
  width: 0%;
  background: #f8f8f8;
  animation: scrubber-play 24s linear infinite;
}
@keyframes scrubber-play {
  0% { width: 0%; }
  100% { width: 100%; }
}

/* ── Dark status bar override ── */
.dark-status .phone-status-bar {
  background: transparent;
  color: #dfdfdf;
}
.dark-status .phone-status-bar .status-icons svg {
  color: #dfdfdf;
}

/* ── Podcast player ── */
.podcast-artwork {
  position: relative;
  width: 100%;
  height: 340px;
  background: linear-gradient(135deg, #2c3e50 0%, #3498db 50%, #2c3e50 100%);
  overflow: hidden;
}
.podcast-artwork-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.85;
}
.podcast-artwork-overlay {
  position: absolute;
  bottom: 12px;
  left: 12px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.podcast-show-thumb {
  width: 44px;
  height: 44px;
  border-radius: 4px;
  object-fit: cover;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.podcast-artwork-strip {
  position: absolute;
  bottom: 12px;
  left: 68px;
  right: 12px;
  height: 37px;
  background: rgba(255,255,255,0.47);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  cursor: pointer;
  transition: background 0.12s;
}
.podcast-artwork-strip:hover {
  background: rgba(255,255,255,0.6);
}
.podcast-artwork-strip svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: #fff;
}
.podcast-artwork-strip-text {
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 12px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Podcast strip pulse (timeline-aware update) ── */
@keyframes podcast-strip-pulse {
  0% { background: rgba(74,127,212,0.5); }
  100% { background: rgba(255,255,255,0.47); }
}
.podcast-artwork-strip.strip-updated {
  animation: podcast-strip-pulse 0.8s ease-out;
}

.podcast-player {
  padding: 20px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.podcast-show-info {
  display: flex;
  align-items: center;
  gap: 8px;
}
.podcast-show-info-thumb {
  width: 36px;
  height: 36px;
  border-radius: 3px;
  object-fit: cover;
}
.podcast-show-labels {
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 1.1px;
  text-transform: uppercase;
}
.podcast-show-date { color: var(--content-secondary); }
.podcast-show-name { color: var(--content-primary); }

.podcast-episode-title {
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 24px;
  line-height: 1.2;
  letter-spacing: 0.24px;
  color: #121212;
}

.podcast-scrubber {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.podcast-scrubber-bar {
  height: 4px;
  background: rgba(18,18,18,0.16);
  border-radius: 100px;
  position: relative;
}
.podcast-scrubber-elapsed {
  height: 100%;
  width: 0%;
  background: #121212;
  border-radius: 100px;
  animation: podcast-elapsed 24s linear infinite;
}
@keyframes podcast-elapsed {
  0% { width: 0%; }
  100% { width: 100%; }
}
.podcast-scrubber-times {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 12px;
  color: #363636;
}

.podcast-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
}
.podcast-ctrl-btn {
  width: 38px;
  height: 38px;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  padding: 0;
}
.podcast-ctrl-btn svg {
  width: 24px;
  height: 24px;
}
.podcast-ctrl-btn.play-btn {
  width: 48px;
  height: 48px;
}
.podcast-ctrl-btn.play-btn svg {
  width: 38px;
  height: 38px;
}

.podcast-secondary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  padding: 8px 0;
  background: #f8f8f8;
  border-radius: 5px;
}
.podcast-secondary-btn {
  border: none;
  background: none;
  cursor: pointer;
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 16px;
  color: #121212;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
}
.podcast-secondary-btn svg {
  width: 20px;
  height: 20px;
}

.podcast-queue-label {
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: var(--content-primary);
  padding: 24px 0 12px;
}

.podcast-queue-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}
.podcast-queue-thumb {
  width: 52px;
  height: 52px;
  border-radius: 3px;
  object-fit: cover;
  flex-shrink: 0;
}
.podcast-queue-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.podcast-queue-show {
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--content-primary);
}
.podcast-queue-title {
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 17px;
  line-height: 1.25;
  color: var(--content-primary);
}
.podcast-queue-dur {
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--content-primary);
}

/* ── Overview page (no device frame) ── */
.overview-page {
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 32px 80px;
  font-family: var(--font-franklin);
  color: #121212;
}
.overview-page h1 {
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 32px;
  line-height: 1.15;
  margin-bottom: 8px;
}
.overview-page .ov-subtitle {
  font-size: 16px;
  font-weight: 400;
  color: #666;
  line-height: 1.5;
  margin-bottom: 40px;
}
.overview-page h2 {
  font-family: var(--font-franklin);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #121212;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid #121212;
}
.overview-page p {
  font-size: 15px;
  line-height: 1.6;
  color: #333;
  margin-bottom: 16px;
}
.ov-layer {
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
}
.ov-layer-card {
  flex: 1;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #e8e8e8;
}
.ov-layer-card h3 {
  font-family: var(--font-franklin);
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ov-layer-card h3 svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}
.ov-layer-card p {
  font-size: 13px;
  color: #666;
  line-height: 1.5;
  margin-bottom: 0;
}
.ov-example {
  margin-top: 12px;
  padding: 10px 12px;
  background: #f8f8f8;
  border-radius: 8px;
  font-size: 12px;
  color: #888;
  line-height: 1.6;
}
.ov-example strong {
  color: #555;
}
.ov-surface-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 32px;
}
.ov-surface-table th {
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #999;
  padding: 8px 0;
  border-bottom: 1px solid #e2e2e2;
}
.ov-surface-table td {
  padding: 10px 0;
  border-bottom: 1px solid #f2f2f2;
  vertical-align: top;
  color: #333;
}
.ov-surface-table td:first-child {
  font-weight: 600;
  color: #121212;
  width: 120px;
}
.ov-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Hub Registry + Device Frame JS
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  // ━━━ Registry ━━━
  var registry = [];
  var activeId = null;
  var contentEl = document.getElementById('prototype-content');
  var scrollEl = document.getElementById('content-scroll');
  var listEl = document.getElementById('sidebar-list');

  window.__registerPrototype = function (entry) {
    registry.push(entry);
  };

  window.__findPrototype = function (id) {
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === id) return registry[i];
    }
    return null;
  };

  function activatePrototype(id) {
    if (activeId === id) return;

    var current = window.__findPrototype(activeId);
    if (current && current.unmount) current.unmount();

    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.scrollTop = 0;

    var next = window.__findPrototype(id);
    activeId = id;
    if (next && next.mount) next.mount(contentEl, scrollEl);

    var items = listEl.querySelectorAll('.sidebar-item');
    for (var k = 0; k < items.length; k++) {
      items[k].classList.toggle('active', items[k].getAttribute('data-proto-id') === id);
    }
  }

  window.__initPrototypeHub = function () {
    listEl.innerHTML = '';
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].hidden) continue;

      if (registry[i].section) {
        var sec = document.createElement('li');
        sec.className = 'sidebar-section';
        sec.textContent = registry[i].section;
        listEl.appendChild(sec);
      }

      var li = document.createElement('li');
      var btn = document.createElement('button');
      btn.className = 'sidebar-item';
      btn.setAttribute('data-proto-id', registry[i].id);

      if (!registry[i].noDot) {
        var dot = document.createElement('span');
        dot.className = 'status-dot ' + (registry[i].status || 'ready');
        btn.appendChild(dot);
      }

      var label = document.createTextNode(registry[i].label);
      btn.appendChild(label);

      btn.addEventListener('click', (function (id) {
        return function () { activatePrototype(id); };
      })(registry[i].id));

      li.appendChild(btn);
      listEl.appendChild(li);
    }

    if (registry.length > 0) {
      activatePrototype(registry[0].id);
    }
  };

  // ━━━ Device Frame ━━━
  var app = document.getElementById('app');
  var btnDesktop = document.getElementById('btn-desktop');
  var btnMobile = document.getElementById('btn-mobile');
  var wrapper = document.getElementById('device-wrapper');
  var frame = document.getElementById('device-frame');
  var frameArea = document.getElementById('frame-area');

  var PHONE_W = 393;
  var PHONE_H = 852;
  var VERTICAL_PAD = 64;

  function getPhoneScale() {
    var availW = Math.max(200, frameArea.clientWidth - 48);
    var availH = Math.max(300, frameArea.clientHeight - VERTICAL_PAD);
    var scale = Math.min(0.92, availW / PHONE_W, availH / PHONE_H);
    return Math.max(0.3, scale);
  }

  function getDesktopSize() {
    return {
      w: Math.min(900, frameArea.clientWidth - 48),
      h: frameArea.clientHeight - 72
    };
  }

  function setMode(mode) {
    if (mode === 'desktop') {
      app.classList.remove('mode-mobile');
      app.classList.add('mode-desktop');
      btnDesktop.classList.add('active');
      btnMobile.classList.remove('active');
      var sz = getDesktopSize();
      frame.style.width = sz.w + 'px';
      frame.style.height = sz.h + 'px';
      wrapper.style.transform = 'scale(1)';
    } else {
      app.classList.remove('mode-desktop');
      app.classList.add('mode-mobile');
      btnMobile.classList.add('active');
      btnDesktop.classList.remove('active');
      frame.style.width = PHONE_W + 'px';
      frame.style.height = PHONE_H + 'px';
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    }
  }

  window.__setDeviceMode = setMode;

  btnDesktop.addEventListener('click', function () { setMode('desktop'); });
  btnMobile.addEventListener('click', function () { setMode('mobile'); });

  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    if (e.key === 'd' || e.key === 'D') setMode('desktop');
    if (e.key === 'm' || e.key === 'M') setMode('mobile');
  });

  window.addEventListener('resize', function () {
    if (app.classList.contains('mode-mobile')) {
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    } else {
      var sz = getDesktopSize();
      frame.style.width = sz.w + 'px';
      frame.style.height = sz.h + 'px';
    }
  });

  frame.style.width = PHONE_W + 'px';
  frame.style.height = PHONE_H + 'px';
  wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
})();
</script>

        + '<span class="ctx-strip-caret">\u203a</span>';
      deviceFrame.appendChild(strip);
      strip.addEventListener('click', showAsk);

      // ── Article bottom bar ──
      var bar = document.createElement('div');

      bar.innerHTML = ''
        + '<div class="article-bar-left">'
        + '  <button class="article-bar-btn" aria-label="Go back"><svg viewBox="0 0 24 24" fill="none" stroke="#121212" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>'

        + '      <button class="try-chip" data-query="Explain the tariff court ruling"><svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>Explain the tariff court ruling</button>'

        + '  <input class="chat-input" type="text" placeholder="Ask anything about this article..." />'
        + '</div>';
      deviceFrame.appendChild(askSheet);
      askInput = askSheet.querySelector('.chat-input');

      askSheet.querySelector('.ask-sheet-handle').addEventListener('click', hideAsk);

      // ── Text selection listener ──
      selectionHandler = function () {
        var sel = window.getSelection();
        if (!sel || sel.isCollapsed || !sel.rangeCount) {
          strip.classList.remove('selection-active');
          return;
        }
        var range = sel.getRangeAt(0);
        var body = contentEl.querySelector('.article-body');
        if (!body || !body.contains(range.startContainer)) {
          strip.classList.remove('selection-active');
          return;
        }
        var text = sel.toString().trim();
        if (text.length < 2) return;
        selectedText = text;
        strip.classList.remove('selection-active');
        void strip.offsetWidth;
        strip.classList.add('selection-active');
        updateStripText(truncate(text, 36));
      };
      document.addEventListener('selectionchange', selectionHandler);

      // ── Scroll-based contextual prompts ──
      scrollHandler = function () {
        if (selectedText) return;
        var st = scrollEl.scrollTop;
        var prompt = SCROLL_PROMPTS[0].text;
        for (var i = SCROLL_PROMPTS.length - 1; i >= 0; i--) {
          if (st >= SCROLL_PROMPTS[i].threshold) {
            prompt = SCROLL_PROMPTS[i].text;
            break;
          }
        }
        updateStripText(prompt);
      };
      scrollEl.addEventListener('scroll', scrollHandler);
    },
    unmount: function () {
      searchOpen = false;
      askOpen = false;
      selectedText = '';
      if (selectionHandler) {
        document.removeEventListener('selectionchange', selectionHandler);
        selectionHandler = null;
      }
      if (scrollHandler) {
        var scrollEl = document.getElementById('content-scroll');

      }
      var els = document.querySelectorAll('.article-bar, .ctx-strip, .search-overlay, .ask-sheet-scrim, .ask-sheet');
      els.forEach(function (el) { el.remove(); });
      searchOverlay = null; askSheet = null; askScrim = null;
      searchInput = null; askInput = null; strip = null;
    }
  });
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
